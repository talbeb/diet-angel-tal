services:
  - type: web
    name: diet-angel-tal
    runtime: node
    plan: free
    buildCommand: cd client && npm ci --include=dev && npm run build && cd ../server && npm ci --include=dev && npm run build
    startCommand: cd server && node dist/index.js
      - key: MONGO_URI
        sync: false # set manually in Render dashboard
      - key: ANTHROPIC_API_KEY
        sync: false # set manually in Render dashboard
